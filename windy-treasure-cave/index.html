<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Windy Treasure Cave</title>
  <link rel="stylesheet" href="vendor/katex/katex.min.css">
  <!-- DotGothic16: Japanese bitmap-style font used when body.lang-jp is set.
       Falls back gracefully to the OS Japanese font if Google Fonts can't load
       (e.g. offline lecture room). Press Start 2P is bundled locally
       (see css/style.css @font-face). -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/caveboard.css">
  <link rel="stylesheet" href="css/windDie.css">
  <link rel="stylesheet" href="css/coin.css">
  <link rel="stylesheet" href="css/scene0.css">
  <link rel="stylesheet" href="css/scene1.css">
  <link rel="stylesheet" href="css/scene2.css">
  <link rel="stylesheet" href="css/scene3.css">
  <link rel="stylesheet" href="css/scene4.css">
  <link rel="stylesheet" href="css/scene5.css">
  <link rel="stylesheet" href="css/scene6.css">
  <link rel="stylesheet" href="css/scene7.css">
  <link rel="stylesheet" href="css/scene8.css">
  <link rel="stylesheet" href="css/scene9.css">
  <link rel="stylesheet" href="css/scene10.css">
  <link rel="stylesheet" href="css/scene11.css">
  <link rel="stylesheet" href="css/scene12.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">SML &middot; WINDY TREASURE CAVE</div>
    <div id="scene-title" class="scene-title">loading&hellip;</div>
    <div class="right-cluster">
      <button id="prev-btn" class="pager-btn" type="button" data-i18n="topbar.prev">PREV</button>
      <div id="dot-pager" class="dot-pager"></div>
      <button id="next-btn" class="pager-btn" type="button" data-i18n="topbar.next">NEXT</button>
      <div id="concept-badges" class="concept-badges" aria-label="concept badges earned"></div>
      <button id="music-toggle" class="theme-toggle music-toggle" type="button" aria-label="Toggle music">&#9834; MUSIC OFF</button>
      <button id="lang-toggle" class="theme-toggle lang-toggle" type="button" aria-label="Toggle language">&#26085;&#26412;&#35486;</button>
      <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle theme" data-i18n="topbar.theme">theme</button>
    </div>
  </header>

  <main id="stage" class="stage"></main>

  <!-- vendor + precomputed data -->
  <script src="vendor/katex/katex.min.js"></script>
  <script src="data/datasets.js"></script>
  <script src="js/katex-helpers.js"></script>

  <!-- engine: actions + cave (the MDP), aliased to Moves / Battle -->
  <script src="js/actions.js"></script>
  <script src="js/cave.js"></script>
  <script src="js/bellman.js"></script>
  <script src="js/sarsa.js"></script>

  <!-- chrome: theme + i18n core, then the 13 scene i18n fragments -->
  <script src="js/theme.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/i18n/scene0.i18n.js"></script>
  <script src="js/i18n/scene1.i18n.js"></script>
  <script src="js/i18n/scene2.i18n.js"></script>
  <script src="js/i18n/scene3.i18n.js"></script>
  <script src="js/i18n/scene4.i18n.js"></script>
  <script src="js/i18n/scene5.i18n.js"></script>
  <script src="js/i18n/scene6.i18n.js"></script>
  <script src="js/i18n/scene7.i18n.js"></script>
  <script src="js/i18n/scene8.i18n.js"></script>
  <script src="js/i18n/scene9.i18n.js"></script>
  <script src="js/i18n/scene10.i18n.js"></script>
  <script src="js/i18n/scene11.i18n.js"></script>
  <script src="js/i18n/scene12.i18n.js"></script>

  <!-- audio + dialog + reusable widgets -->
  <script src="js/sfx.js"></script>
  <script src="js/music.js"></script>
  <script src="js/dialog.js"></script>
  <script src="js/caveboard.js"></script>
  <script src="js/windDie.js"></script>
  <script src="js/speakerNotes.js"></script>
  <script src="js/i18n-ui.js"></script>
  <script src="js/music-ui.js"></script>

  <!-- scenes + pager -->
  <script src="js/scenes/scene0.js"></script>
  <script src="js/scenes/scene1.js"></script>
  <script src="js/scenes/scene2.js"></script>
  <script src="js/scenes/scene3.js"></script>

  <script src="js/scenes/scene10.js"></script>
  <script src="js/scenes/scene11.js"></script>
  <script src="js/scenes/scene12.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
